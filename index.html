<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Prime Resume — Free Resume Builder. No Sign Up. Done in Minutes.</title>
  <meta name="description" content="Build a professional ATS-optimized resume for free in minutes. No account needed. Your data stays in your browser. Trusted by job seekers worldwide."/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808;
      --white: #f5f2eb;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-border: rgba(201,168,76,0.22);
      --gray: #888;
      --dim: #555;
      --border: #1a1a1a;
      --panel: #0d0d0d;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(8,8,8,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gold-border);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; color: var(--gold); letter-spacing: 0.08em; }
    .nav-links { display: flex; gap: 1.8rem; }
    .nav-links a { font-size: 0.76rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray); transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--gold); color: #000;
      padding: 0.55rem 1.2rem; border-radius: 2px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.73rem; letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.2s; white-space: nowrap;
    }
    .nav-cta:hover { background: var(--gold-light); }

    /* ─── HERO ─── */
    .hero-section {
      padding: 5.5rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      max-width: 100%;
    }
    .hero-glow {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Rating row */
    .hero-rating {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.4s ease both;
    }
    .stars { color: var(--gold); font-size: 1rem; letter-spacing: 0.05em; }
    .rating-text { font-size: 0.8rem; color: var(--gray); }
    .rating-text strong { color: var(--white); font-weight: 500; }

    /* Headline */
    .hero-h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(2.1rem, 8vw, 3.8rem);
      line-height: 1.05; letter-spacing: -0.03em;
      margin-bottom: 1rem;
      animation: fadeUp 0.4s 0.07s ease both;
    }
    .hero-h1 .gold { color: var(--gold); }

    .hero-sub {
      font-size: 1rem; color: #999; line-height: 1.75;
      max-width: 520px; margin: 0 auto 2rem;
      animation: fadeUp 0.4s 0.14s ease both;
    }
    .hero-sub strong { color: var(--white); font-weight: 500; }

    /* Primary CTA */
    .hero-cta-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.4s 0.21s ease both;
    }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--gold); color: #000;
      padding: 1.1rem 2.5rem; border-radius: 2px;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.95rem; letter-spacing: 0.06em; text-transform: uppercase;
      border: 2px solid var(--gold); transition: all 0.2s;
      width: 100%; max-width: 380px;
    }
    .btn-primary:hover { background: transparent; color: var(--gold); }
    .btn-secondary-sm {
      font-size: 0.8rem; color: var(--dim); letter-spacing: 0.06em;
      text-transform: uppercase; transition: color 0.2s;
      font-family: 'Syne', sans-serif; font-weight: 600;
    }
    .btn-secondary-sm:hover { color: var(--white); }
    .btn-secondary-sm::before { content: '→ '; }

    /* Trust pills */
    .trust-row {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.4s 0.28s ease both;
    }
    .trust-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(201,168,76,0.06); border: 1px solid var(--gold-border);
      padding: 0.35rem 0.8rem; border-radius: 100px;
      font-size: 0.72rem; color: var(--gray); font-family: 'Syne', sans-serif; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .trust-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    /* ─── TEMPLATE SHOWCASE ─── */
    .template-showcase {
      margin-bottom: 1rem;
      animation: fadeUp 0.4s 0.32s ease both;
    }
    .showcase-label {
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 1rem; font-family: 'Syne', sans-serif; font-weight: 600;
    }
    .template-cards {
      display: flex; gap: 0.7rem; overflow-x: auto;
      padding: 0.5rem 0 1rem; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .template-cards::-webkit-scrollbar { display: none; }
    .t-card {
      flex-shrink: 0; width: 110px;
      border: 1.5px solid #1e1e1e; border-radius: 3px;
      overflow: hidden; cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      scroll-snap-align: start;
      position: relative;
    }
    .t-card:hover { border-color: var(--gold-border); transform: translateY(-2px); }
    .t-card.active { border-color: var(--gold); }
    .t-thumb {
      height: 75px; background: white; overflow: hidden;
      display: flex; flex-direction: column;
    }
    /* Classic */
    .t-thumb.classic { padding: 6px 7px; gap: 2px; justify-content: flex-start; }
    .t-thumb.classic .ln-name { height: 3px; background: #111; width: 55%; margin: 0 auto 2px; }
    .t-thumb.classic .ln-div { height: 1px; background: #888; width: 100%; margin-bottom: 2px; }
    .t-thumb.classic .ln-body { height: 1px; background: #ddd; width: 85%; }
    .t-thumb.classic .ln-body2 { height: 1px; background: #eee; width: 70%; }
    /* Modern */
    .t-thumb.modern { padding: 0; }
    .t-thumb.modern .top-bar { height: 5px; background: #2563eb; width: 100%; }
    .t-thumb.modern .mod-body { padding: 5px 6px; display: flex; flex-direction: column; gap: 2px; }
    .t-thumb.modern .ln-name2 { height: 2.5px; background: #111; width: 60%; }
    .t-thumb.modern .ln-blue { height: 1.5px; background: #2563eb; width: 40%; }
    .t-thumb.modern .ln-body { height: 1px; background: #ddd; width: 90%; margin-top: 2px; }
    .t-thumb.modern .ln-body2 { height: 1px; background: #eee; width: 75%; }
    /* Executive */
    .t-thumb.executive { padding: 0; }
    .t-thumb.executive .exec-head { background: #0d1f3c; padding: 6px 7px; border-bottom: 2px solid #c9a84c; }
    .t-thumb.executive .exec-head .ln-name { height: 2.5px; background: rgba(255,255,255,0.9); width: 65%; margin-bottom: 2px; }
    .t-thumb.executive .exec-head .ln-gold { height: 1.5px; background: #c9a84c; width: 45%; }
    .t-thumb.executive .exec-body { padding: 5px 7px; display: flex; flex-direction: column; gap: 2px; }
    .t-thumb.executive .ln-gold2 { height: 1.5px; background: #c9a84c; width: 100%; }
    .t-thumb.executive .ln-body { height: 1px; background: #ddd; width: 80%; }
    .t-thumb.executive .ln-body2 { height: 1px; background: #eee; width: 60%; }
    /* Exclusive */
    .t-thumb.exclusive { padding: 6px 7px; gap: 2px; border-top: 3px solid #c9a84c; }
    .t-thumb.exclusive .ln-name { height: 2.5px; background: #111; width: 55%; margin-bottom: 2px; }
    .t-thumb.exclusive .ln-gold { height: 1.5px; background: #c9a84c; width: 45%; margin-bottom: 3px; }
    .t-thumb.exclusive .ln-div { height: 1.5px; background: #c9a84c; width: 100%; margin-bottom: 2px; }
    .t-thumb.exclusive .ln-body { height: 1px; background: #ddd; width: 90%; }
    .t-thumb.exclusive .ln-body2 { height: 1px; background: #eee; width: 75%; }

    .t-label {
      background: #141414; padding: 0.35rem 0.4rem;
      font-family: 'Syne', sans-serif; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; color: #888;
      text-align: center;
    }
    .t-pro-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--gold); color: #000;
      font-size: 0.42rem; font-family: 'Syne', sans-serif; font-weight: 800;
      letter-spacing: 0.06em; padding: 0.1rem 0.3rem; border-radius: 1px;
    }

    /* counter pill */
    .counter-wrap {
      margin-top: 0.5rem;
      animation: fadeUp 0.4s 0.36s ease both;
    }
    .counter-pill {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--panel); border: 1px solid var(--gold-border);
      padding: 0.45rem 1rem; border-radius: 100px;
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.05em;
    }

    /* ─── 3-STEP STRIP ─── */
    .steps-strip {
      background: #0a0a0a;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; justify-content: center;
      gap: 0; flex-wrap: nowrap; overflow-x: auto;
    }
    .step-item {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--dim); white-space: nowrap; flex-shrink: 0;
    }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 800; color: var(--gold); flex-shrink: 0;
    }
    .step-arrow {
      color: #2a2a2a; font-size: 0.9rem; margin: 0 0.6rem; flex-shrink: 0;
    }

    /* ─── PROOF NUMBERS ─── */
    .proof-section {
      padding: 2.5rem 1.5rem;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .proof-box {
      background: #0a0a0a; padding: 1.5rem 1rem; text-align: center;
    }
    .proof-big {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.8rem; color: var(--gold); line-height: 1;
      margin-bottom: 0.3rem;
    }
    .proof-label { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Syne', sans-serif; font-weight: 600; }

    /* ─── SECTIONS ─── */
    .sec { padding: 3.5rem 1.5rem; }
    .sec-center { text-align: center; }
    .sec-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.7rem; font-family: 'Syne', sans-serif; font-weight: 700; display: block; }
    .sec-h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.6rem, 5vw, 2.6rem); line-height: 1.1; margin-bottom: 0.8rem; }
    .sec-h2 .gold { color: var(--gold); }
    .sec-sub { color: var(--gray); font-size: 0.9rem; line-height: 1.75; max-width: 520px; margin: 0 auto; }

    /* ─── TESTIMONIALS ─── */
    .t-bg { background: #060606; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .t-scroll {
      display: flex; gap: 1rem; overflow-x: auto; padding: 1.5rem 1.5rem 0.5rem;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .t-scroll::-webkit-scrollbar { display: none; }
    .t-card-review {
      flex-shrink: 0; width: min(85vw, 300px);
      background: #0e0e0e; border: 1px solid var(--border);
      padding: 1.5rem; scroll-snap-align: start;
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .t-stars { color: var(--gold); font-size: 0.8rem; }
    .t-text { font-size: 0.85rem; color: #bbb; line-height: 1.75; font-style: italic; flex: 1; }
    .t-text::before { content: '\201C'; }
    .t-text::after { content: '\201D'; }
    .t-author { display: flex; align-items: center; gap: 0.7rem; }
    .t-av { width: 34px; height: 34px; border-radius: 50%; background: var(--gold-dim); border: 1px solid var(--gold-border); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.68rem; color: var(--gold); flex-shrink: 0; }
    .t-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.78rem; color: var(--white); }
    .t-role { font-size: 0.68rem; color: var(--dim); }
    .t-win { font-size: 0.63rem; color: var(--gold); font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 0.1rem; }
    .scroll-hint { text-align: center; font-size: 0.68rem; color: #333; padding: 0.8rem 0 0.2rem; letter-spacing: 0.06em; font-family: 'Syne', sans-serif; }

    /* ─── FEATURES GRID ─── */
    .features-bg { background: #060606; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin-top: 2rem; }
    .f-card { background: #0a0a0a; padding: 1.4rem; }
    .f-icon { width: 34px; height: 34px; border-radius: 6px; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; margin-bottom: 0.7rem; }
    .f-card h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; margin-bottom: 0.3rem; }
    .f-card p { font-size: 0.75rem; color: var(--dim); line-height: 1.6; }
    .f-badge { display: inline-block; margin-top: 0.4rem; background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold); font-size: 0.56rem; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.1rem 0.4rem; }

    /* ─── COMPARISON ─── */
    .comp-bg { background: #060606; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .comp-table-wrap { overflow-x: auto; margin-top: 2rem; -webkit-overflow-scrolling: touch; }
    .comp-table { width: 100%; border-collapse: collapse; min-width: 420px; }
    .comp-table th { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.8rem 1rem; text-align: center; border-bottom: 1px solid var(--border); color: var(--dim); }
    .comp-table th:first-child { text-align: left; }
    .comp-table th.hl { color: var(--gold); }
    .comp-table td { padding: 0.75rem 1rem; font-size: 0.8rem; color: #888; border-bottom: 1px solid var(--border); text-align: center; }
    .comp-table td:first-child { text-align: left; color: var(--white); font-size: 0.78rem; }
    .comp-table tr:last-child td { border-bottom: none; }
    .col-us { background: rgba(201,168,76,0.03); }
    .ck { color: var(--gold); }
    .cx { color: #252525; }
    .price-row td { font-family: 'Syne', sans-serif; font-weight: 800; }
    .price-row .col-us { color: var(--gold); }

    /* ─── PRICING ─── */
    .pricing-stack { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
    .plan { border: 1px solid var(--border); padding: 2rem 1.5rem; background: #0a0a0a; position: relative; }
    .plan.featured { border-color: var(--gold); background: rgba(201,168,76,0.02); }
    .plan-badge { position: absolute; top: -11px; left: 1.5rem; background: var(--gold); color: #000; padding: 0.18rem 0.7rem; font-size: 0.6rem; font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .plan-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; margin-bottom: 0.2rem; }
    .plan.featured .plan-name { color: var(--gold); }
    .plan-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.5rem; line-height: 1; margin-bottom: 0.2rem; }
    .plan.featured .plan-price { color: var(--gold); }
    .plan-period { font-size: 0.76rem; color: var(--dim); margin-bottom: 1.5rem; }
    .plan-feats { list-style: none; margin-bottom: 1.5rem; }
    .plan-feats li { padding: 0.45rem 0; font-size: 0.8rem; color: #aaa; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; }
    .plan-feats li::before { content: '✓'; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .btn-plan { display: block; text-align: center; padding: 0.9rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; border-radius: 2px; }
    .btn-free { border: 1px solid #2a2a2a; color: var(--white); }
    .btn-free:hover { border-color: var(--white); }
    .btn-prem { background: var(--gold); color: #000; }
    .btn-prem:hover { background: var(--gold-light); }

    /* ─── FINAL CTA ─── */
    .final-cta {
      text-align: center; padding: 4.5rem 1.5rem;
      background: linear-gradient(180deg, #080808 0%, #0d0a06 100%);
      border-top: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .final-cta::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%); pointer-events: none; }
    .final-cta h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 6vw, 2.8rem); line-height: 1.1; margin-bottom: 0.8rem; position: relative; }
    .final-cta > p { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; position: relative; }
    .final-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; position: relative; }
    .final-note { margin-top: 1rem; font-size: 0.7rem; color: #444; position: relative; }

    /* ─── FOOTER ─── */
    footer { border-top: 1px solid var(--border); padding: 2rem 1.5rem; }
    .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--gold); font-size: 0.85rem; margin-bottom: 1rem; }
    .footer-links { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; margin-bottom: 1rem; }
    .footer-links a { font-size: 0.72rem; color: #444; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { font-size: 0.68rem; color: #333; }

    /* ─── LOADING ─── */
    #primeLoad { position: fixed; inset: 0; z-index: 9999; background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; transition: opacity 0.5s; }
    #primeLoad.out { opacity: 0; pointer-events: none; }
    .ld-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--gold); letter-spacing: 0.12em; }
    .ld-bar { width: 180px; height: 2px; background: #1a1a1a; }
    .ld-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.2s; }
    .ld-msg { font-siz
