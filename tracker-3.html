<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Prime Resume — Job Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow-x: hidden; background: var(--black); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 4rem;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1rem; color: var(--gold); letter-spacing: 0.06em;
      text-decoration: none;
    }
    .nav-back {
      font-size: 0.78rem; color: #555; text-decoration: none;
      letter-spacing: 0.08em; text-transform: uppercase;
      font-family: 'Syne', sans-serif; font-weight: 600;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    /* HEADER */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--white);
    }
    .page-title span { color: var(--gold); }
    .page-sub {
      font-size: 0.78rem;
      color: #555;
      margin-top: 0.3rem;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
      margin-bottom: 2rem;
    }
    .stat-box {
      background: #0d0d0d;
      padding: 1.2rem 1.5rem;
      text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.3rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }

    /* ADD JOB FORM */
    .add-form {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .add-form-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .add-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 0.8rem;
      align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .form-input, .form-select {
      background: #181818;
      border: 1px solid #2a2a2a;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      border-radius: 2px;
      width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold); }
    .form-input::placeholder { color: #333; }
    .form-select option { background: #181818; }

    .btn-add-job {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 0.6rem 1.2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 2px;
      white-space: nowrap;
      height: fit-content;
    }
    .btn-add-job:hover { background: var(--gold-light); }

    /* FILTER ROW */
    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.35rem 0.9rem;
      background: #111;
      border: 1px solid #2a2a2a;
      color: #555;
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: #aaa; border-color: #444; }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

    /* JOBS LIST */
    .jobs-list { display: flex; flex-direction: column; gap: 1px; }

    .job-card {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .job-card:hover { border-color: #2a2a2a; }

    .job-info { min-width: 0; }
    .job-role {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--white);
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-company {
      font-size: 0.78rem;
      color: #666;
    }
    .job-date {
      font-size: 0.72rem;
      color: #444;
      font-family: 'Syne', sans-serif;
      white-space: nowrap;
    }

    .status-badge {
      padding: 0.25rem 0.7rem;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .status-badge:hover { opacity: 0.8; }
    .status-applied    { background: rgba(100,150,255,0.15); color: #6496ff; border: 1px solid rgba(100,150,255,0.3); }
    .status-interview  { background: rgba(201,168,76,0.15);  color: #c9a84c; border: 1px solid rgba(201,168,76,0.3); }
    .status-offer      { background: rgba(92,184,92,0.15);   color: #5cb85c; border: 1px solid rgba(92,184,92,0.3); }
    .status-rejected   { background: rgba(217,83,79,0.15);   color: #d9534f; border: 1px solid rgba(217,83,79,0.3); }
    .status-saved      { background: rgba(150,150,150,0.1);  color: #666;    border: 1px solid #2a2a2a; }

    .btn-delete-job {
      background: none;
      border: none;
      color: #2a2a2a;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.3rem;
      transition: color 0.2s;
      line-height: 1;
    }
    .btn-delete-job:hover { color: #d9534f; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #333;
      border: 1px solid #1a1a1a;
      background: #0d0d0d;
    }
    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #444;
      margin-bottom: 0.5rem;
    }
    .empty-state p { font-size: 0.78rem; color: #333; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #1a1a1a; border: 1px solid var(--gold);
      color: var(--white); padding: 0.75rem 1.4rem;
      border-radius: 4px; font-size: 0.85rem;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .page { padding: 5rem 1rem 3rem; }
      .add-form-grid { grid-template-columns: 1fr 1fr; }
      .job-card { grid-template-columns: 1fr auto auto; }
      .job-date { display: none; }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CJPEMMWNP7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CJPEMMWNP7');
  </script>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">MY PRIME RESUME</a>
    <a href="builder.html" class="nav-back">← Back to Builder</a>
  </nav>

  <div class="page">

    <!-- HEADER -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Job <span>Tracker</span></h1>
        <p class="page-sub">Track every job you apply to. Stay on top of your search.</p>
      </div>
      <button class="btn-add-job" onclick="toggleForm()">+ Add Job</button>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statApplied">0</div>
        <div class="stat-label">Applied</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statInterview">0</div>
        <div class="stat-label">Interview</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statOffer">0</div>
        <div class="stat-label">Offer</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statRejected">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <!-- ADD FORM -->
    <div class="add-form" id="addForm" style="display:none;">
      <div class="add-form-title">✦ Add New Application</div>
      <div class="add-form-grid">
        <div class="form-group">
          <label class="form-label">Company</label>
          <input class="form-input" id="inputCompany" type="text" placeholder="e.g. Flutterwave"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <input class="form-input" id="inputRole" type="text" placeholder="e.g. Backend Developer"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="inputStatus">
            <option value="saved">Saved</option>
            <option value="applied" selected>Applied</option>
            <option value="interview">Interview</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <button class="btn-add-job" onclick="addJob()">Add</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterJobs('all', this)">All</button>
      <button class="filter-btn" onclick="filterJobs('saved', this)">Saved</button>
      <button class="filter-btn" onclick="filterJobs('applied', this)">Applied</button>
      <button class="filter-btn" onclick="filterJobs('interview', this)">Interview</button>
      <button class="filter-btn" onclick="filterJobs('offer', this)">Offer</button>
      <button class="filter-btn" onclick="filterJobs('rejected', this)">Rejected</button>
    </div>

    <!-- JOBS LIST -->
    <div class="jobs-list" id="jobsList"></div>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="feedback.js"></script>
  <script>
    let jobs = [];
    let currentFilter = 'all';

    const STATUS_LABELS = {
      saved: 'Saved',
      applied: 'Applied',
      interview: 'Interview',
      offer: 'Offer 🎉',
      rejected: 'Rejected'
    };

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function toggleForm() {
      const form = document.getElementById('addForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        document.getElementById('inputCompany').focus();
      }
    }

    function addJob() {
      const company = document.getElementById('inputCompany').value.trim();
      const role = document.getElementById('inputRole').value.trim();
      const status = document.getElementById('inputStatus').value;

      if (!company || !role) {
        showToast('Please fill in company and role.');
        return;
      }

      // Check free limit
      const isPremium = localStorage.getItem('prime_premium') === 'true' || localStorage.getItem('prime_dev') === 'true';
      const limit = isPremium ? Infinity : 5;
      if (jobs.length >= limit) {
        showToast('🔒 Free limit reached — upgrade to Premium for unlimited tracking');
        setTimeout(() => window.location.href = 'pricing.html', 2000);
        return;
      }

      const job = {
        id: Date.now(),
        company,
        role,
        status,
        date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      };

      jobs.unshift(job);
      saveJobs();
      renderJobs();
      updateStats();

      // Reset form
      document.getElementById('inputCompany').value = '';
      document.getElementById('inputRole').value = '';
      document.getElementById('inputStatus').value = 'applied';

      showToast('✅ Application added!');

      // First job motivation
      if (jobs.length === 1) {
        setTimeout(() => showToast('🚀 First application tracked. Keep going!'), 1500);
      }
    }

    function updateStatus(id, newStatus) {
      const job = jobs.find(j => j.id === id);
      if (!job) return;
      job.status = newStatus;
      saveJobs();
      renderJobs();
      updateStats();
      if (newStatus === 'offer') showToast('🎉 Congratulations on the offer!');
      if (newStatus === 'interview') showToast('💪 Interview secured! Prepare well.');
    }

    function deleteJob(id) {
      jobs = jobs.filter(j => j.id !== id);
      saveJobs();
      renderJobs();
      updateStats();
      showToast('Removed.');
    }

    function filterJobs(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderJobs();
    }

    function renderJobs() {
      const list = document.getElementById('jobsList');
      const filtered = currentFilter === 'all' ? jobs : jobs.filter(j => j.status === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h3>${currentFilter === 'all' ? 'No applications yet' : 'No ' + currentFilter + ' applications'}</h3>
            <p>${currentFilter === 'all' ? 'Add your first job application above.' : 'Nothing here yet.'}</p>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(job => `
        <div class="job-card" id="job-${job.id}">
          <div class="job-info">
            <div class="job-role">${escapeHtml(job.role)}</div>
            <div class="job-company">${escapeHtml(job.company)}</div>
          </div>
          <div class="job-date">${job.date}</div>
          <div style="position:relative">
            <button class="status-badge status-${job.status}" onclick="toggleStatusMenu(${job.id}, this)">
              ${STATUS_LABELS[job.status]}
            </button>
          </div>
          <button class="btn-delete-job" onclick="deleteJob(${job.id})" title="Remove">✕</button>
        </div>
      `).join('');
    }

    function toggleStatusMenu(id, btn) {
      // Remove any existing menus
      document.querySelectorAll('.status-menu').forEach(m => m.remove());

      const statuses = ['saved', 'applied', 'interview', 'offer', 'rejected'];
      const menu = document.createElement('div');
      menu.className = 'status-menu';
      menu.style.cssText = `
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        background: #111;
        border: 1px solid #2a2a2a;
        z-index: 100;
        min-width: 120px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      `;
      menu.innerHTML = statuses.map(s => `
        <button onclick="updateStatus(${id}, '${s}'); this.closest('.status-menu').remove();"
          style="display:block;width:100%;padding:0.6rem 0.8rem;background:none;border:none;
          border-bottom:1px solid #1a1a1a;color:#888;font-family:'Syne',sans-serif;
          font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
          cursor:pointer;text-align:left;transition:color 0.2s;"
          onmouseover="this.style.color='#c9a84c'"
          onmouseout="this.style.color='#888'">
          ${STATUS_LABELS[s]}
        </button>
      `).join('');

      btn.parentElement.style.position = 'relative';
      btn.parentElement.appendChild(menu);

      // Close on outside click
      setTimeout(() => {
        document.addEventListener('click', function handler(e) {
          if (!menu.contains(e.target) && e.target !== btn) {
            menu.remove();
            document.removeEventListener('click', handler);
          }
        });
      }, 0);
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = jobs.length;
      document.getElementById('statApplied').textContent = jobs.filter(j => j.status === 'applied').length;
      document.getElementById('statInterview').textContent = jobs.filter(j => j.status === 'interview').length;
      document.getElementById('statOffer').textContent = jobs.filter(j => j.status === 'offer').length;
      document.getElementById('statRejected').textContent = jobs.filter(j => j.status === 'rejected').length;
    }

    function saveJobs() {
      localStorage.setItem('prime_jobs', JSON.stringify(jobs));
    }

    function loadJobs() {
      const saved = localStorage.getItem('prime_jobs');
      if (saved) {
        try { jobs = JSON.parse(saved); } catch(e) { jobs = []; }
      }
      renderJobs();
      updateStats();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Allow Enter key to add job
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('addForm').style.display !== 'none') {
        addJob();
      }
    });

    loadJobs();
  </script>

</body>
</html>
